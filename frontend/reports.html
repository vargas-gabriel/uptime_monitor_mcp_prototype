<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uptime Monitor — Reports</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <a href="index.html" class="brand">UptimeMonitor</a>
  <a href="index.html">Dashboard</a>
  <a href="reports.html" class="active">Reports</a>
</nav>

<div class="page">
  <div class="page-header">
    <h1>SLO Compliance Report</h1>
    <button id="exportBtn" class="btn btn-secondary">Export CSV</button>
  </div>

  <!-- Summary Bar -->
  <div class="summary-bar">
    <div class="summary-item">
      <div class="s-label">Total Monitors</div>
      <div class="s-value" id="summaryTotal">—</div>
    </div>
    <div class="summary-item">
      <div class="s-label">Compliant</div>
      <div class="s-value" id="summaryCompliant" style="color:var(--color-up)">—</div>
    </div>
    <div class="summary-item">
      <div class="s-label">Non-compliant</div>
      <div class="s-value" id="summaryNonCompliant" style="color:var(--color-down)">—</div>
    </div>
  </div>

  <!-- Report Table -->
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Monitor</th>
            <th>URL</th>
            <th>Uptime % (30d)</th>
            <th>SLO Target</th>
            <th>Compliant</th>
            <th>Checks Total</th>
            <th>Budget Remaining</th>
            <th>Open Incidents</th>
          </tr>
        </thead>
        <tbody id="reportBody">
          <tr><td colspan="8" style="text-align:center"><span class="spinner"></span></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module" src="js/reports.js"></script>
</body>
</html>
