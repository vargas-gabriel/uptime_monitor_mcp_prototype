<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uptime Monitor — Monitor Detail</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="brand">UptimeMonitor</a>
  <a href="index.html">Dashboard</a>
  <a href="reports.html">Reports</a>
</nav>

<div class="page">
  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="index.html">Dashboard</a>
    <span>/</span>
    <span>Monitor Detail</span>
  </div>

  <!-- Actions -->
  <div class="page-header">
    <h1>Monitor Detail</h1>
    <button id="checkNowBtn" class="btn btn-primary">Check Now</button>
  </div>

  <!-- SLO Panel -->
  <div id="sloPanel" class="slo-panel">
    <div class="empty-state"><span class="spinner"></span></div>
  </div>

  <!-- Response Time Chart -->
  <div class="section-heading">Response Time (last 100 checks)</div>
  <div class="card" style="margin-bottom:1.5rem">
    <div class="chart-container">
      <canvas id="responseChart"></canvas>
    </div>
  </div>

  <!-- Uptime History -->
  <div class="section-heading">Uptime History (last 50 checks)</div>
  <div class="card" style="margin-bottom:1.5rem;padding:1rem 1.25rem">
    <div id="uptimeHistory" class="check-history"></div>
    <div style="margin-top:0.75rem;display:flex;gap:1rem;font-size:12px;color:var(--color-muted)">
      <span><span class="check-dot up" style="display:inline-block;margin-right:4px;vertical-align:middle"></span>Up</span>
      <span><span class="check-dot down" style="display:inline-block;margin-right:4px;vertical-align:middle"></span>Down</span>
    </div>
  </div>

  <!-- Incidents -->
  <div class="section-heading">Incidents</div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Started</th>
            <th>Resolved</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody id="incidentsBody">
          <tr><td colspan="3" style="text-align:center"><span class="spinner"></span></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module" src="js/monitor.js"></script>
</body>
</html>
